version: '3'
services:
  jackett:
    image: linuxserver/jackett:arm64v8-latest@sha256:7f3582bf477bb1ba68c03dcfbc40ecde40fc2794bfa925b6bea598aa5e4b86b2
    container_name: jackett
    restart: unless-stopped
    ports:
      - 8031:9117
    volumes:
      - ./services/Jackett/config:/config
    environment:
      - PUID=911
      - PGID=1000
      - TZ=Europe/Paris
      - JACKETT_KEY=5641
    links:
      - flaresolverr

  radarr:
    image: linuxserver/radarr:arm64v8-latest@sha256:cde518a845cd3f56809f4a5ae0c62867b3cc5952cc223166860e4c12b12c927f
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./services/Radarr/config:/config
      - ./data:/data
    ports:
      - 8032:7878
    restart: unless-stopped
    links:
      - jackett
      - uploader

  sonarr:
    image: linuxserver/sonarr:arm64v8-latest@sha256:630090bc7280214bb8bec96876238053b081ae30007b18e5980c549a94ed888c
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./services/Sonarr/config:/config
      - ./data:/data
    ports:
      - 8033:8989
    restart: unless-stopped
    links:
      - jackett
      - uploader

  flaresolverr:
    image: flaresolverr/flaresolverr:latest@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/London
    restart: unless-stopped

  uploader:
    container_name: torrent_uploader
    build: .
    environment:
      - ALLDEBRID_API_KEY=${ALLDEBRID_API_KEY}
    restart: unless-stopped
    volumes:
      - ./data:/data
